<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jozi Nites Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Hamburger Nav -->
    <nav class="navbar"> 
        <!-- Paste your existing navbar here if needed -->
    </nav>

    <div class="login-container">
        <div class="login-box">
            <img src="Jozi Nites Academy Logo.png" alt="Logo" class="logo">
            <h1>Learners Portal</h1>
            <p>Welcome Back to Jozi Nites Academy</p>

            <form id="loginForm">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                
                <button type="submit" class="btn login-btn">LOGIN</button>
            </form>

            <div class="login-links">
                <p>Don't have an account? <a href="register.html">Register Here</a></p>
                <p><a href="#">Forgot Password?</a></p>
            </div>

            <div id="loginMessage" class="message"></div>

            <p class="back-link"><a href="index.html">← Back to Homepage</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
