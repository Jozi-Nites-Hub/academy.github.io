<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jozi Nites Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="Jozi Nites Academy Logo.png" alt="Jozi Nites Academy Logo" class="logo">
        <h1>Jozi Nites Academy</h1>
        <p class="tagline">Nurturing Relationships, Empowering Individuals 🍍</p>
    </header>

    <div class="form-container">
        <h2>Sign In to Your Learners Portal</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="register.html">Register here</a></p>
        <p><a href="index.html">← Back to Library</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
