name: Deploy Jozi Nites Academy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Optimize Images
        uses: calvellido/image-optim-action@v1
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          path: .

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true

      - name: Send Success Notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ✅ Jozi Nites Academy - Site Updated Successfully!
          to: academy@jozinites.co.za
          from: Jozi Nites Academy Bot <no-reply@jozinites.co.za>
          body: Great news Johnny Boy! 🍍 Your website has been successfully updated and is now live.
